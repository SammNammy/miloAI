<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Milo – AI Assistant</title>
    <!-- Tailwind CSS + Font Awesome + Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <!-- KaTeX & Prism.js -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.7/dist/katex.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.7/dist/katex.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        body { background: #f9f9f9; overflow: hidden; }
        .dark body { background: #0a0a0a; }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #2c2c2c; }
        /* Message animations */
        .message-row {
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Collapsible long message */
        .collapsible-content.expanded {
            max-height: none !important;
        }
        /* Pill composer */
        .composer-pill {
            transition: all 0.1s ease;
        }
        .composer-pill:focus-within {
            box-shadow: 0 0 0 2px rgba(34,197,94,0.2);
        }
        /* Green accent */
        .accent-green {
            color: #10b981;
        }
        .bg-accent-green {
            background-color: #10b981;
        }
        .hover\:bg-accent-green-dark:hover {
            background-color: #059669;
        }
        .ring-accent-green {
            --tw-ring-color: #10b981;
        }
    </style>
</head>
<body class="font-sans antialiased">
    <div class="flex h-screen w-full overflow-hidden">
        <!-- SIDEBAR (Dark) -->
        <aside class="w-72 bg-gray-900 text-white flex flex-col shadow-xl z-10 transition-colors">
            <div class="p-4 border-b border-gray-800">
                <button id="newChatBtn" class="w-full flex items-center justify-center gap-2 bg-accent-green hover:bg-emerald-700 text-white rounded-xl py-2.5 px-4 transition">
                    <i class="fas fa-plus"></i> New chat
                </button>
            </div>
            <div class="flex-1 overflow-y-auto p-2">
                <div id="chatHistoryList" class="space-y-1">
                    <!-- dynamic history -->
                </div>
            </div>
            <div class="p-4 border-t border-gray-800 space-y-4">
                <!-- Model selector -->
                <div>
                    <label class="text-xs text-gray-400 block mb-1">Model</label>
                    <select id="modelSelect" class="w-full bg-gray-800 border border-gray-700 text-white rounded-lg px-3 py-2 text-sm">
                        <option value="deepseek/deepseek-r1:free">⚡ Milo Fast</option>
                        <option value="google/gemini-2.0-flash-lite-preview-02-05:free">🧠 Milo Deep Think</option>
                        <option value="openai/gpt-4o-mini">💪 Milo 120B</option>
                    </select>
                </div>
                <!-- Web search toggle -->
                <div class="flex items-center justify-between">
                    <span class="text-sm text-gray-300"><i class="fas fa-globe mr-1"></i> Web search</span>
                    <button id="webSearchToggle" class="w-10 h-5 rounded-full bg-gray-700 relative transition-colors">
                        <span class="absolute top-0.5 left-0.5 w-4 h-4 rounded-full bg-white transition-transform"></span>
                    </button>
                </div>
                <!-- Dark mode toggle -->
                <div class="flex items-center justify-between">
                    <span class="text-sm text-gray-300"><i class="fas fa-moon mr-1"></i> Dark mode</span>
                    <button id="darkModeToggle" class="w-10 h-5 rounded-full bg-gray-700 relative transition-colors">
                        <span class="absolute top-0.5 left-0.5 w-4 h-4 rounded-full bg-white transition-transform"></span>
                    </button>
                </div>
                <!-- Backup / Restore -->
                <div class="flex gap-2 pt-2">
                    <button id="backupBtn" class="flex-1 bg-gray-800 hover:bg-gray-700 text-xs py-2 rounded-lg"><i class="fas fa-download"></i> Backup</button>
                    <button id="restoreBtn" class="flex-1 bg-gray-800 hover:bg-gray-700 text-xs py-2 rounded-lg"><i class="fas fa-upload"></i> Restore</button>
                </div>
            </div>
        </aside>

        <!-- MAIN CHAT AREA -->
        <main class="flex-1 flex flex-col bg-white dark:bg-black">
            <!-- Header (invisible but holds title) -->
            <div class="flex items-center justify-between px-6 py-3 border-b border-gray-200 dark:border-gray-800">
                <h1 class="text-xl font-semibold text-gray-800 dark:text-white">Milo</h1>
                <div class="text-xs text-gray-400">Free AI · Unlimited</div>
            </div>

            <!-- Messages container -->
            <div id="messagesContainer" class="flex-1 overflow-y-auto px-4 py-6">
                <div id="messages" class="max-w-3xl mx-auto space-y-6">
                    <!-- Welcome message -->
                    <div class="message-row flex justify-start">
                        <div class="max-w-[80%] rounded-2xl px-4 py-3 bg-gray-100 dark:bg-gray-800 text-gray-800 dark:text-gray-100">
                            <p>👋 Hey! I'm Milo. Ask me anything, upload images, or turn on web search.</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Composer (Pill-shaped) -->
            <div class="px-4 py-4 border-t border-gray-200 dark:border-gray-800 bg-white dark:bg-black">
                <div class="max-w-3xl mx-auto">
                    <div class="composer-pill flex items-center gap-2 bg-gray-100 dark:bg-gray-800 rounded-full px-4 py-2 border border-gray-300 dark:border-gray-700 focus-within:ring-2 focus-within:ring-emerald-500/50">
                        <button id="attachBtn" class="text-gray-500 hover:text-emerald-600 transition">
                            <i class="fas fa-paperclip text-lg"></i>
                        </button>
                        <input type="text" id="messageInput" placeholder="Send a message..." class="flex-1 bg-transparent border-0 focus:ring-0 outline-none py-2 px-2 text-gray-800 dark:text-white placeholder-gray-400">
                        <button id="sendBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white rounded-full p-2 w-9 h-9 flex items-center justify-center transition">
                            <i class="fas fa-arrow-up"></i>
                        </button>
                    </div>
                    <div class="text-center text-xs text-gray-400 mt-2">
                        <span id="attachmentPreview"></span>
                        <span id="typingIndicator" class="hidden italic">Milo is thinking...</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Hidden file input -->
    <input type="file" id="fileInput" accept="image/*,text/plain,application/pdf" class="hidden" multiple>

    <script>
        // -------------------- ALL YOUR EXISTING LOGIC (streaming, models, search, etc.) --------------------
        // I've preserved the core functionality but adapted DOM IDs to match new layout.
        // The code below is the same reliable engine you built, just with updated references.

        // ========== CONFIG ==========
        let currentChatId = Date.now().toString();
        let chats = JSON.parse(localStorage.getItem('milo_chats') || '{}');
        if (Object.keys(chats).length === 0) {
            chats[currentChatId] = { name: "New chat", messages: [{ role: 'assistant', content: "👋 Hey! I'm Milo. Ask me anything, upload images, or turn on web search." }] };
        } else {
            currentChatId = Object.keys(chats)[0];
        }
        let currentMessages = chats[currentChatId]?.messages || [];
        let webSearchEnabled = false;
        let darkMode = localStorage.getItem('darkMode') === 'true';
        let currentAttachment = null;
        let isStreaming = false;
        let currentAbortController = null;

        // DOM elements (new IDs)
        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const newChatBtn = document.getElementById('newChatBtn');
        const modelSelect = document.getElementById('modelSelect');
        const webSearchToggle = document.getElementById('webSearchToggle');
        const darkModeToggle = document.getElementById('darkModeToggle');
        const attachBtn = document.getElementById('attachBtn');
        const fileInput = document.getElementById('fileInput');
        const attachmentPreview = document.getElementById('attachmentPreview');
        const typingIndicator = document.getElementById('typingIndicator');
        const chatHistoryList = document.getElementById('chatHistoryList');

        // Helper: Render messages (with KaTeX & code highlight)
        function renderMessages() {
            messagesDiv.innerHTML = '';
            currentMessages.forEach((msg, idx) => {
                const isUser = msg.role === 'user';
                const div = document.createElement('div');
                div.className = `message-row flex ${isUser ? 'justify-end' : 'justify-start'}`;
                let contentHtml = marked.parse(msg.content);
                // KaTeX render
                contentHtml = contentHtml.replace(/\$\$([\s\S]+?)\$\$/g, (_, tex) => {
                    try { return katex.renderToString(tex, { throwOnError: false }); } catch(e) { return `<span class="text-red-500">${tex}</span>`; }
                });
                contentHtml = contentHtml.replace(/\$([^\$]+?)\$/g, (_, tex) => {
                    try { return katex.renderToString(tex, { throwOnError: false }); } catch(e) { return `<span class="text-red-500">${tex}</span>`; }
                });
                const innerDiv = document.createElement('div');
                innerDiv.className = `max-w-[80%] rounded-2xl px-4 py-3 ${isUser ? 'bg-emerald-600 text-white' : 'bg-gray-100 dark:bg-gray-800 text-gray-800 dark:text-gray-100'}`;
                innerDiv.innerHTML = contentHtml;
                if (msg.content.length > 800 && !isUser) {
                    const collapseBtn = document.createElement('button');
                    collapseBtn.className = 'text-xs text-gray-400 mt-2 underline';
                    collapseBtn.innerText = 'Show more';
                    let collapsed = true;
                    const contentDiv = document.createElement('div');
                    contentDiv.innerHTML = innerDiv.innerHTML;
                    innerDiv.innerHTML = '';
                    innerDiv.appendChild(contentDiv);
                    innerDiv.appendChild(collapseBtn);
                    collapseBtn.onclick = () => {
                        if (collapsed) {
                            contentDiv.style.maxHeight = 'none';
                            collapseBtn.innerText = 'Show less';
                        } else {
                            contentDiv.style.maxHeight = '200px';
                            collapseBtn.innerText = 'Show more';
                        }
                        collapsed = !collapsed;
                    };
                    contentDiv.style.overflow = 'hidden';
                    contentDiv.style.maxHeight = '200px';
                }
                div.appendChild(innerDiv);
                messagesDiv.appendChild(div);
            });
            Prism.highlightAllUnder(messagesDiv);
            scrollToBottom();
        }

        function scrollToBottom() {
            const container = document.getElementById('messagesContainer');
            container.scrollTop = container.scrollHeight;
        }

        // Save current chat
        function saveCurrentChat() {
            chats[currentChatId] = { name: chats[currentChatId]?.name || "New chat", messages: currentMessages };
            localStorage.setItem('milo_chats', JSON.stringify(chats));
            renderChatList();
        }

        function renderChatList() {
            chatHistoryList.innerHTML = '';
            Object.entries(chats).forEach(([id, chat]) => {
                const btn = document.createElement('button');
                btn.className = `w-full text-left px-3 py-2 rounded-lg text-sm flex justify-between items-center ${id === currentChatId ? 'bg-gray-800' : 'hover:bg-gray-800/50'}`;
                btn.innerHTML = `<span class="truncate">${chat.name || 'Chat'}</span><i class="fas fa-trash-alt text-gray-500 hover:text-red-400 text-xs" data-id="${id}"></i>`;
                btn.onclick = (e) => {
                    if (e.target.classList.contains('fa-trash-alt')) {
                        e.stopPropagation();
                        deleteChat(id);
                    } else {
                        switchChat(id);
                    }
                };
                chatHistoryList.appendChild(btn);
            });
        }

        function switchChat(id) {
            currentChatId = id;
            currentMessages = chats[id]?.messages || [];
            renderMessages();
            saveCurrentChat();
        }

        function deleteChat(id) {
            delete chats[id];
            localStorage.setItem('milo_chats', JSON.stringify(chats));
            if (id === currentChatId) {
                const remaining = Object.keys(chats);
                if (remaining.length) currentChatId = remaining[0];
                else {
                    currentChatId = Date.now().toString();
                    chats[currentChatId] = { name: "New chat", messages: [] };
                }
                currentMessages = chats[currentChatId]?.messages || [];
                renderMessages();
            }
            renderChatList();
        }

        function newChat() {
            currentChatId = Date.now().toString();
            chats[currentChatId] = { name: "New chat", messages: [] };
            currentMessages = [];
            renderMessages();
            saveCurrentChat();
            renderChatList();
        }

        // Streaming API call
        async function sendMessage() {
            if (isStreaming) return;
            const userText = messageInput.value.trim();
            if (!userText && !currentAttachment) return;
            const model = modelSelect.value;
            const userMsg = { role: 'user', content: userText || (currentAttachment ? '[Image attached]' : '') };
            if (currentAttachment) {
                // Handle image attachment (already base64 in currentAttachment)
                userMsg.content = userText ? `${userText}\n![image](${currentAttachment})` : `![image](${currentAttachment})`;
            }
            currentMessages.push(userMsg);
            renderMessages();
            messageInput.value = '';
            const loadingMsg = { role: 'assistant', content: '...' };
            currentMessages.push(loadingMsg);
            renderMessages();

            isStreaming = true;
            typingIndicator.classList.remove('hidden');
            if (currentAbortController) currentAbortController.abort();
            currentAbortController = new AbortController();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: currentMessages.slice(0, -1),
                        model: model,
                        webSearch: webSearchEnabled,
                        imageAttachment: currentAttachment || null
                    }),
                    signal: currentAbortController.signal
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullContent = '';
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') continue;
                            try {
                                const parsed = JSON.parse(data);
                                if (parsed.content) {
                                    fullContent += parsed.content;
                                    currentMessages[currentMessages.length-1].content = fullContent;
                                    renderMessages();
                                }
                            } catch(e) {}
                        }
                    }
                }
                if (!fullContent) currentMessages[currentMessages.length-1].content = "Sorry, I couldn't generate a response.";
            } catch (err) {
                if (err.name !== 'AbortError') {
                    currentMessages[currentMessages.length-1].content = `Error: ${err.message}`;
                    renderMessages();
                }
            } finally {
                isStreaming = false;
                typingIndicator.classList.add('hidden');
                currentAbortController = null;
                currentAttachment = null;
                attachmentPreview.innerText = '';
                saveCurrentChat();
                renderChatList();
            }
        }

        // Attach file handler
        attachBtn.onclick = () => fileInput.click();
        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    currentAttachment = ev.target.result;
                    attachmentPreview.innerText = `📷 ${file.name}`;
                };
                reader.readAsDataURL(file);
            } else {
                alert('Only images supported for now.');
            }
            fileInput.value = '';
        };

        // Web search toggle UI
        function updateWebSearchUI() {
            webSearchToggle.querySelector('span').style.transform = webSearchEnabled ? 'translateX(20px)' : 'translateX(0px)';
            webSearchToggle.style.backgroundColor = webSearchEnabled ? '#10b981' : '#4b5563';
        }
        webSearchToggle.onclick = () => { webSearchEnabled = !webSearchEnabled; updateWebSearchUI(); };
        // Dark mode
        function applyDarkMode() {
            if (darkMode) document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
            darkModeToggle.querySelector('span').style.transform = darkMode ? 'translateX(20px)' : 'translateX(0px)';
            localStorage.setItem('darkMode', darkMode);
        }
        darkModeToggle.onclick = () => { darkMode = !darkMode; applyDarkMode(); };
        // Backup/Restore
        document.getElementById('backupBtn').onclick = () => {
            const data = JSON.stringify(chats);
            const blob = new Blob([data], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `milo_backup_${Date.now()}.json`;
            a.click();
        };
        document.getElementById('restoreBtn').onclick = () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'application/json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const restored = JSON.parse(ev.target.result);
                        if (restored && typeof restored === 'object') {
                            chats = restored;
                            localStorage.setItem('milo_chats', JSON.stringify(chats));
                            const firstId = Object.keys(chats)[0];
                            if (firstId) switchChat(firstId);
                            else newChat();
                            renderChatList();
                        }
                    } catch(err) { alert('Invalid backup file'); }
                };
                reader.readAsText(file);
            };
            input.click();
        };
        sendBtn.onclick = sendMessage;
        messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
        newChatBtn.onclick = newChat;

        // Initialize
        renderMessages();
        renderChatList();
        updateWebSearchUI();
        applyDarkMode();
        // Clean up on page unload
        window.addEventListener('beforeunload', () => { if (currentAbortController) currentAbortController.abort(); });
    </script>
</body>
</html>
